<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Iuran Warga RT</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
:root{
  --g-dark:#1B5E20;--g-mid:#2E7D32;--g-btn:#388E3C;
  --g-lite:#E8F5E9;--g-tag:#C8E6C9;
  --red:#C62828;--red-bg:#FFEBEE;--yellow:#F9A825;
  --white:#FFFFFF;--bg:#F0F4F0;--gray:#9E9E9E;--text:#1A1A1A;
  --r:14px;--sh:0 2px 12px rgba(0,0,0,.09);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

#screen-login{position:fixed;inset:0;z-index:100;background:linear-gradient(160deg,var(--g-dark) 0%,var(--g-btn) 100%);display:flex;align-items:center;justify-content:center;padding:24px}
.login-box{background:white;border-radius:22px;padding:36px 28px;width:100%;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.login-box .logo{font-size:56px;text-align:center;margin-bottom:6px}
.login-box h2{font-size:20px;font-weight:800;color:var(--g-dark);text-align:center}
.login-box .sub{font-size:12px;color:var(--gray);text-align:center;margin:4px 0 26px}
.field{margin-bottom:13px}
.field label{font-size:11px;font-weight:700;color:var(--g-mid);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.field input{width:100%;padding:12px 14px;border:2px solid #E8E8E8;border-radius:10px;font-size:14px;outline:none;transition:border .2s}
.field input:focus{border-color:var(--g-mid)}
#login-err{font-size:12px;min-height:18px;margin:2px 0 10px;text-align:center}

.btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:13px;border:none;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-g{background:var(--g-btn);color:white}
.btn-g:hover{background:var(--g-mid)}
.btn-o{background:white;color:var(--g-mid);border:2px solid var(--g-mid)}
.btn-sm{padding:9px 16px;font-size:12px;width:auto;border-radius:9px}
.btn-row{display:flex;gap:8px;margin-top:10px}

header{background:var(--g-dark);color:white;padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;box-shadow:0 3px 10px rgba(0,0,0,.2)}
.hd-info h1{font-size:15px;font-weight:800}
.hd-info p{font-size:11px;opacity:.7;margin-top:1px}
#btn-out{margin-left:auto;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);color:white;padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;font-weight:600}

.tabs{display:flex;background:var(--g-mid)}
.tab{flex:1;padding:11px 6px;color:rgba(255,255,255,.55);font-size:12px;font-weight:700;text-align:center;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
.tab.on{color:white;border-bottom-color:#A5D6A7}

.page{display:none;padding:15px;max-width:500px;margin:0 auto;padding-bottom:36px}
.page.on{display:block}

.card{background:white;border-radius:var(--r);padding:16px;margin-bottom:13px;box-shadow:var(--sh)}
.card-title{font-size:13px;font-weight:800;color:var(--g-dark);margin-bottom:13px;display:flex;align-items:center;gap:7px}

#reader{width:100%;border-radius:10px;overflow:hidden;background:#111;min-height:50px}

#hasil-box{display:none;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);margin-top:12px}
.hasil-top{padding:15px 17px;background:var(--g-dark);color:white}
.hasil-top h3{font-size:16px;font-weight:800}
.hasil-top p{font-size:11px;opacity:.75;margin-top:2px}
.hasil-body{background:white;padding:15px 17px}
.row-info{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #F2F2F2;font-size:13px}
.row-info:last-of-type{border:none}
.row-info .lbl{color:var(--gray)}
.row-info .val{font-weight:700}

.bulan-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:13px 0}
.bulan-btn{padding:9px 3px;border-radius:8px;border:2px solid #E5E5E5;background:white;font-size:10px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s;line-height:1.5}
.bulan-btn:active{transform:scale(.94)}
.bulan-btn.lunas{background:var(--g-tag);border-color:var(--g-btn);color:var(--g-dark);cursor:default}
.bulan-btn.pick{background:var(--g-mid);border-color:var(--g-dark);color:white}

.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:13px}
.stat{background:white;border-radius:var(--r);padding:15px 8px;text-align:center;box-shadow:var(--sh)}
.stat .num{font-size:26px;font-weight:800;color:var(--g-dark)}
.stat .lbl{font-size:10px;color:var(--gray);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}

.search{width:100%;padding:10px 14px;border:2px solid #E5E5E5;border-radius:10px;font-size:13px;outline:none;margin-bottom:10px;transition:border .2s}
.search:focus{border-color:var(--g-mid)}
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid #E5E5E5}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--g-mid);color:white;padding:9px 8px;text-align:center;white-space:nowrap;font-weight:700}
td{padding:8px 7px;text-align:center;border-bottom:1px solid #F5F5F5}
tr:last-child td{border:none}
tr:nth-child(even) td{background:#FAFBFA}
.prog-wrap{width:100%;min-width:80px}
.prog-label{font-size:10px;font-weight:700;margin-bottom:3px;display:flex;justify-content:space-between;align-items:center}
.prog-label .frac{color:var(--g-dark)}
.prog-label .pct{color:var(--gray)}
.prog-bar{height:8px;background:#E5E5E5;border-radius:10px;overflow:hidden}
.prog-fill{height:100%;border-radius:10px;transition:width .3s}

.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:28px;color:var(--gray);font-size:13px}
.spin{width:20px;height:20px;border:3px solid #E0E0E0;border-top-color:var(--g-btn);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(16px);background:#212121;color:white;padding:11px 22px;border-radius:11px;font-size:13px;font-weight:600;opacity:0;transition:all .28s;z-index:999;max-width:88vw;text-align:center;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{background:var(--g-mid)}
#toast.err{background:var(--red)}

#main{display:none}
</style>
</head>
<body>

<div id="screen-login">
  <div class="login-box">
    <div class="logo">🏘️</div>
    <h2>Iuran Warga RT 07</h2>
    <p class="sub">Masuk sebagai petugas untuk melanjutkan</p>
    <div class="field">
      <label>Nama Petugas</label>
      <input type="text" id="in-nama" placeholder="contoh: Pak RT" autocomplete="off">
    </div>
    <div class="field">
      <label>PIN</label>
      <input type="password" id="in-pin" placeholder="Masukkan PIN" inputmode="numeric">
    </div>
    <div id="login-err"></div>
    <button class="btn btn-g" onclick="doLogin()">🔐 Masuk</button>
  </div>
</div>

<div id="main">
  <header>
    <div style="font-size:22px">🏘️</div>
    <div class="hd-info">
      <h1>Iuran Warga RT 07</h1>
      <p>Agustus 2026 - Juli 2027</p>
    </div>
    <button id="btn-out" onclick="doLogout()">Keluar</button>
  </header>

  <div class="tabs">
    <div class="tab on"  onclick="goTab('scan')">📷 Scan QR</div>
    <div class="tab"     onclick="goTab('rekap')">📊 Rekap</div>
  </div>

  <div class="page on" id="pg-scan">
    <div class="card">
      <div class="card-title">📷 Scan QR Warga</div>
      <div id="reader"></div>
      <div class="btn-row">
        <button class="btn btn-g btn-sm" onclick="startScan()">▶ Mulai</button>
        <button class="btn btn-o btn-sm" onclick="stopScan()">⏹ Stop</button>
      </div>
    </div>
    <div id="hasil-box">
      <div class="hasil-top">
        <h3 id="h-nama">-</h3>
        <p  id="h-sub">-</p>
      </div>
      <div class="hasil-body">
        <div class="row-info"><span class="lbl">Kode</span><span class="val" id="h-kode">-</span></div>
        <div class="row-info"><span class="lbl">Nama</span><span class="val" id="h-namax">-</span></div>
        <div class="row-info"><span class="lbl">RT</span>  <span class="val" id="h-rt">-</span></div>
        <div class="row-info"><span class="lbl">Lunas</span><span class="val" id="h-lunas">-</span></div>
        <p style="font-size:12px;color:#9E9E9E;margin:13px 0 6px;font-weight:600">PILIH BULAN YANG DIBAYAR:</p>
        <div class="bulan-grid" id="bulan-grid"></div>
        <button class="btn btn-g" onclick="simpan()">💾 Simpan Pembayaran</button>
        <button class="btn btn-o" style="margin-top:8px" onclick="resetScan()">🔄 Scan Lagi</button>
      </div>
    </div>
  </div>

  <div class="page" id="pg-rekap">
    <div class="stat-grid">
      <div class="stat"><div class="num" id="s-total">-</div><div class="lbl">Warga</div></div>
      <div class="stat"><div class="num" id="s-lunas" style="color:var(--g-btn)">-</div><div class="lbl">Lunas</div></div>
      <div class="stat"><div class="num" id="s-pct"   style="color:var(--yellow)">-</div><div class="lbl">Persen</div></div>
    </div>
    <div class="card">
      <div class="card-title">📊 Status per Warga</div>
      <input class="search" type="text" id="in-cari" placeholder="🔍 Cari nama / kode..." oninput="filterRekap()">
      <div id="area-rekap"><div class="loading"><div class="spin"></div> Memuat...</div></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── URL Apps Script sudah tertanam — tidak perlu setting manual ──
const APPS_URL = "https://script.google.com/macros/s/AKfycbxRFTR4Tn61VwOCqSh2pNWfU3BIluDqVN54Cq3lYavGZ8PVrB43JXGx_unWnR1GjIP-pQ/exec";

const BULAN = [
  "Agustus 2026","September 2026","Oktober 2026","November 2026",
  "Desember 2026","Januari 2027","Februari 2027","Maret 2027",
  "April 2027","Mei 2027","Juni 2027","Juli 2027"
];

let petugas=null, allWarga=null, scanner=null, scanKode=null, scanStatus={};

async function fetchApi(body){
  const resp = await fetch(APPS_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body: JSON.stringify(body)
  });
  return resp.json();
}

// ── Login via Apps Script ─────────────────────────────────────
async function doLogin(){
  const nama = document.getElementById('in-nama').value.trim();
  const pin  = document.getElementById('in-pin').value.trim();
  const err  = document.getElementById('login-err');
  if(!nama||!pin){ err.style.color='#C62828'; err.textContent='Isi nama dan PIN'; return; }

  err.style.color='#2E7D32'; err.textContent='Memverifikasi...';
  try{
    const r = await fetchApi({ action:'login', nama, pin });
    if(!r.ok){ err.style.color='#C62828'; err.textContent='Nama atau PIN salah'; return; }
    petugas = r.nama;
    sessionStorage.setItem('iuran_petugas', petugas);
    masukApp();
  } catch(e){
    err.style.color='#C62828'; err.textContent='Gagal terhubung. Cek koneksi internet.';
  }
}

function masukApp(){
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('main').style.display         = 'block';
  document.getElementById('btn-out').textContent        = '👤 ' + petugas;
}

function doLogout(){
  if(!confirm('Yakin keluar?')) return;
  sessionStorage.removeItem('iuran_petugas');
  petugas=null; location.reload();
}

window.addEventListener('load',()=>{
  const s = sessionStorage.getItem('iuran_petugas');
  if(s){ petugas=s; masukApp(); }
});

document.getElementById('in-pin').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });

// ── Tabs ──────────────────────────────────────────────────────
function goTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  const idx=['scan','rekap'].indexOf(name);
  document.querySelectorAll('.tab')[idx].classList.add('on');
  document.getElementById('pg-'+name).classList.add('on');
  if(name==='rekap') loadRekap();
}

// ── Scanner ───────────────────────────────────────────────────
function startScan(){
  if(scanner) return;
  scanner = new Html5Qrcode("reader");
  scanner.start(
    {facingMode:"environment"},
    {fps:10, qrbox:{width:230,height:230}},
    onScan
  ).catch(()=>toast('Kamera tidak bisa diakses','err'));
}

function stopScan(){
  if(scanner){ scanner.stop().then(()=>{ scanner.clear(); scanner=null; }); }
}

async function onScan(txt){
  stopScan();
  let parsed;
  try{ parsed=JSON.parse(txt); } catch(e){ toast('QR tidak valid','err'); return; }
  if(!parsed.kode){ toast('Format QR salah','err'); return; }

  toast('Mengambil data...','');
  try{
    const r = await fetchApi({ action:'getStatus', kode:parsed.kode });
    if(!r.ok){ toast(r.msg,'err'); return; }
    showHasil(r);
  } catch(e){ toast('Gagal terhubung','err'); }
}

function showHasil(data){
  scanKode=data.kode; scanStatus=data.status||{};
  const cnt = Object.values(scanStatus).filter(Boolean).length;
  document.getElementById('h-nama').textContent  = data.nama;
  document.getElementById('h-sub').textContent   = data.kode+' - '+data.rt;
  document.getElementById('h-kode').textContent  = data.kode;
  document.getElementById('h-namax').textContent = data.nama;
  document.getElementById('h-rt').textContent    = data.rt;
  document.getElementById('h-lunas').textContent = cnt+' / 12 bulan';

  const grid = document.getElementById('bulan-grid');
  grid.innerHTML='';
  BULAN.forEach(bln=>{
    const done = scanStatus[bln]===true;
    const b    = document.createElement('button');
    b.className   = 'bulan-btn'+(done?' lunas':'');
    b.textContent = (done?'✅ ':'')+bln;
    b.dataset.bln = bln;
    if(!done) b.onclick=()=>b.classList.toggle('pick');
    grid.appendChild(b);
  });

  document.getElementById('hasil-box').style.display='block';
  document.getElementById('hasil-box').scrollIntoView({behavior:'smooth'});
}

async function simpan(){
  const picks=[...document.querySelectorAll('.bulan-btn.pick')].map(b=>b.dataset.bln);
  if(!picks.length){ toast('Pilih minimal satu bulan','err'); return; }

  toast('Menyimpan ke Google Sheets...','');
  let ok=0;
  for(const bln of picks){
    try{
      const r = await fetchApi({ action:'bayar', kode:scanKode, bulan:bln, petugas });
      if(r.ok) ok++;
      else toast(r.msg,'err');
    } catch(e){ toast('Gagal terhubung','err'); }
  }
  if(ok>0){ toast(ok+' bulan tersimpan!','ok'); setTimeout(resetScan,2200); }
}

function resetScan(){
  scanKode=null; scanStatus={};
  document.getElementById('hasil-box').style.display='none';
}

// ── Rekap ─────────────────────────────────────────────────────
async function loadRekap(){
  document.getElementById('area-rekap').innerHTML='<div class="loading"><div class="spin"></div> Memuat...</div>';
  try{
    const r = await fetchApi({ action:'getRekap' });
    if(!r.ok){ document.getElementById('area-rekap').innerHTML='<p style="padding:16px;color:var(--red);font-size:13px">'+r.msg+'</p>'; return; }
    allWarga=r.data; renderRekap(allWarga);
  } catch(e){
    document.getElementById('area-rekap').innerHTML='<p style="padding:16px;color:var(--red);font-size:13px">Gagal memuat data.</p>';
  }
}

function filterRekap(){
  if(!allWarga) return;
  const q=document.getElementById('in-cari').value.toLowerCase();
  renderRekap(allWarga.filter(w=>w.nama.toLowerCase().includes(q)||w.kode.toLowerCase().includes(q)));
}

function renderRekap(data){
  const src=allWarga||data;
  const totL=src.reduce((s,w)=>s+w.lunas,0);
  const totB=src.length*12;
  document.getElementById('s-total').textContent = src.length;
  document.getElementById('s-lunas').textContent = totL;
  document.getElementById('s-pct').textContent   = totB>0?Math.round(totL/totB*100)+'%':'0%';

  let h='<div class="tbl-wrap"><table><thead><tr><th>Kode</th><th>Nama</th><th>RT</th><th>Progress Pembayaran</th></tr></thead><tbody>';
  data.forEach(w=>{
    const pct  = Math.round(w.lunas/12*100);
    const clr  = w.lunas===12 ? '#388E3C' : w.lunas>=6 ? '#F9A825' : '#E53935';
    h+=`<tr>
      <td><strong style="color:var(--g-mid)">${w.kode}</strong></td>
      <td style="text-align:left">${w.nama}</td>
      <td>${w.rt}</td>
      <td><div class="prog-wrap">
        <div class="prog-label">
          <span class="frac">${w.lunas}/12 bulan</span>
          <span class="pct">${pct}%</span>
        </div>
        <div class="prog-bar">
          <div class="prog-fill" style="width:${pct}%;background:${clr}"></div>
        </div>
      </div></td>
    </tr>`;
  });
  document.getElementById('area-rekap').innerHTML=h+'</tbody></table></div>';
}

// ── Toast ─────────────────────────────────────────────────────
function toast(msg,type){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='show '+(type||'');
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),3200);
}
</script>
</body>
</html>
